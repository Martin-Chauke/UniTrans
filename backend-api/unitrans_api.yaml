components:
  schemas:
    Bus:
      type: object
      properties:
        bus_id:
          type: integer
          readOnly: true
        registration_number:
          type: string
          maxLength: 50
        model:
          type: string
          maxLength: 100
        capacity:
          type: integer
          maximum: 2147483647
          minimum: 0
        status:
          $ref: '#/components/schemas/BusStatusEnum'
      required:
      - bus_id
      - capacity
      - model
      - registration_number
    BusAssignment:
      type: object
      properties:
        bus_assignment_id:
          type: integer
          readOnly: true
        bus:
          type: integer
        bus_detail:
          allOf:
          - $ref: '#/components/schemas/Bus'
          readOnly: true
        line:
          type: integer
        line_detail:
          allOf:
          - $ref: '#/components/schemas/Line'
          readOnly: true
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          nullable: true
        notes:
          type: string
        is_active:
          type: string
          readOnly: true
        capacity_warning:
          type: string
          readOnly: true
      required:
      - bus
      - bus_assignment_id
      - bus_detail
      - capacity_warning
      - is_active
      - line
      - line_detail
      - start_date
    BusAssignmentRequest:
      type: object
      properties:
        bus:
          type: integer
        line:
          type: integer
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          nullable: true
        notes:
          type: string
      required:
      - bus
      - line
      - start_date
    BusRequest:
      type: object
      properties:
        registration_number:
          type: string
          minLength: 1
          maxLength: 50
        model:
          type: string
          minLength: 1
          maxLength: 100
        capacity:
          type: integer
          maximum: 2147483647
          minimum: 0
        status:
          $ref: '#/components/schemas/BusStatusEnum'
      required:
      - capacity
      - model
      - registration_number
    BusStatusEnum:
      enum:
      - available
      - in_service
      - maintenance
      type: string
      description: |-
        * `available` - Available
        * `in_service` - In Service
        * `maintenance` - Maintenance
    ChangeLineRequest:
      type: object
      properties:
        new_line_id:
          type: integer
        reason:
          type: string
          default: ''
      required:
      - new_line_id
    DayOfWeekEnum:
      enum:
      - 0
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      type: integer
      description: |-
        * `0` - Monday
        * `1` - Tuesday
        * `2` - Wednesday
        * `3` - Thursday
        * `4` - Friday
        * `5` - Saturday
        * `6` - Sunday
    Incident:
      type: object
      properties:
        incident_id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 200
        incident_type:
          $ref: '#/components/schemas/IncidentTypeEnum'
        incident_type_display:
          type: string
          readOnly: true
        description:
          type: string
        reported_at:
          type: string
          format: date-time
          readOnly: true
        resolved:
          type: boolean
        trip:
          type: integer
        trip_detail:
          allOf:
          - $ref: '#/components/schemas/Trip'
          readOnly: true
      required:
      - description
      - incident_id
      - incident_type_display
      - name
      - reported_at
      - trip
      - trip_detail
    IncidentRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        incident_type:
          $ref: '#/components/schemas/IncidentTypeEnum'
        description:
          type: string
          minLength: 1
        resolved:
          type: boolean
        trip:
          type: integer
      required:
      - description
      - name
      - trip
    IncidentTypeEnum:
      enum:
      - delay
      - breakdown
      - accident
      - capacity
      - other
      type: string
      description: |-
        * `delay` - Delay
        * `breakdown` - Breakdown
        * `accident` - Accident
        * `capacity` - Capacity Exceeded
        * `other` - Other
    Line:
      type: object
      properties:
        line_id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        description:
          type: string
        stations:
          type: array
          items:
            $ref: '#/components/schemas/LineStation'
          readOnly: true
      required:
      - line_id
      - name
      - stations
    LineRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
      required:
      - name
    LineStation:
      type: object
      properties:
        line_station_id:
          type: integer
          readOnly: true
        station:
          allOf:
          - $ref: '#/components/schemas/Station'
          readOnly: true
        order_index:
          type: integer
          maximum: 2147483647
          minimum: 0
      required:
      - line_station_id
      - order_index
      - station
    LineStationRequest:
      type: object
      properties:
        station_id:
          type: integer
          writeOnly: true
        order_index:
          type: integer
          maximum: 2147483647
          minimum: 0
      required:
      - order_index
      - station_id
    LineWrite:
      type: object
      properties:
        line_id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        description:
          type: string
      required:
      - line_id
      - name
    LineWriteRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
      required:
      - name
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - email
      - password
    Notification:
      type: object
      properties:
        notification_id:
          type: integer
          readOnly: true
        notification_type:
          $ref: '#/components/schemas/NotificationTypeEnum'
        notification_type_display:
          type: string
          readOnly: true
        message:
          type: string
        is_read:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        student:
          type: integer
          readOnly: true
      required:
      - created_at
      - message
      - notification_id
      - notification_type_display
      - student
    NotificationTypeEnum:
      enum:
      - trip_started
      - trip_delay
      - seat_assigned
      - line_change
      - incident
      - assignment_conflict
      - capacity_warning
      - general
      type: string
      description: |-
        * `trip_started` - Trip Started
