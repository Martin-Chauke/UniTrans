openapi: 3.0.3
info:
  title: UniTrans API
  version: 1.0.0
  description: University Transport Management System API. Provides endpoints for
    student subscriptions, trip scheduling, seat assignments, incident reporting,
    and notifications.
paths:
  /api/auth/login/:
    post:
      operationId: auth_login_create
      summary: Login and obtain JWT tokens
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
          description: ''
        '400':
          description: Invalid credentials
  /api/auth/register/:
    post:
      operationId: auth_register_create
      summary: Register a new student
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          application/x-www-form-urlencoded:
            schema:
